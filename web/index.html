<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Reading Pacer | Liquid Glass UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="glass-card top-panel">
        <div class="title-row">
          <div>
            <h1>PDF Reading Pacer</h1>
            <p>Read at a comfortable pace and move through books at the speed that feels right for you</p>
          </div>
          <div class="title-actions">
            <button id="toggle-erase-mode" class="erase-toggle" type="button" aria-label="Erase mode">
              <span class="eraser-icon" aria-hidden="true"></span>
              Erase mode
            </button>
            <button id="toggle-highlight-mode" class="highlight-toggle" type="button">
              Highlight mode
            </button>
            <label class="highlight-color-control" for="highlight-color">
              <span>Color</span>
              <input id="highlight-color" type="color" value="#fff176" />
            </label>
            <button id="save-annotated" type="button" disabled>Save PDF</button>
          </div>
          <div id="status-chip" class="status-chip">Idle</div>
        </div>

        <div class="controls-grid">
          <div class="control-group">
            <label for="pdf-file">PDF source</label>
            <div class="inline-controls file-picker">
              <input id="pdf-file" type="file" accept="application/pdf" />
              <button id="upload-trigger" class="upload-button" type="button">Upload PDF</button>
              <span id="file-name" class="file-name">No file selected</span>
            </div>
          </div>

          <div class="control-group">
            <label for="speed-slider">Speed</label>
            <div class="inline-controls">
              <input
                id="speed-slider"
                type="range"
                min="60"
                max="1200"
                step="10"
                value="260"
              />
              <span id="speed-value" class="value-pill">260 wpm</span>
            </div>
          </div>

          <div class="control-group">
            <label for="pace-mode">Pace marker</label>
            <div class="inline-controls">
              <select id="pace-mode" class="mode-select">
                <option value="triangle">Sliding triangle</option>
                <option value="drop-down-bookmark">Drop-down bookmark</option>
              </select>
            </div>
          </div>

          <div class="control-group">
            <label>Playback</label>
            <div class="playback-controls">
              <div class="inline-controls">
                <button id="toggle-play" type="button">Pause</button>
                <button id="prev-page" type="button">Prev page</button>
                <button id="next-page" type="button">Next page</button>
              </div>
              <div class="inline-controls page-jump-controls">
                <input
                  id="page-number-input"
                  class="page-number-input"
                  type="number"
                  min="1"
                  step="1"
                  inputmode="numeric"
                  placeholder="Page #"
                  aria-label="Page number"
                />
                <button id="go-to-page" type="button">Go to selected page</button>
              </div>
            </div>
          </div>

          <div class="control-group">
            <label>Appearance</label>
            <div class="inline-controls appearance-controls">
              <div class="appearance-item">
                <span>Background</span>
                <input id="background-color" type="color" value="#041c2b" />
              </div>
              <div class="appearance-item">
                <span>Theme</span>
                <input id="theme-color" type="color" value="#77d8f2" />
              </div>
              <button id="appearance-reset" type="button">Reset</button>
            </div>
          </div>
        </div>
      </section>

      <section class="glass-card viewer-panel">
        <div id="viewer-scroll" class="viewer-scroll">
          <div id="empty-hint" class="empty-hint">
            Upload a PDF file to begin. <br>
            Keyboard controls mirror the desktop app: <br>
            Space, arrows, Shift+Up/Down, and PageUp/PageDown.
          </div>

          <div id="page-stack" class="page-stack" aria-live="polite">
            <canvas id="pdf-canvas"></canvas>
            <canvas id="overlay-canvas"></canvas>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
